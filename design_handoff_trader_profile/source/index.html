<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pelican Social — Copy-Trading</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; background: #efece6; }
  body { font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif; }
  * { box-sizing: border-box; }

  /* ── Theme tokens (warm-paper editorial monochrome) ── */
  .theme-light {
    --bg:        oklch(0.982 0.005 80);
    --surface:   oklch(1.000 0.000 0);
    --surface-2: oklch(0.962 0.005 80);
    --surface-3: oklch(0.945 0.006 80);
    --border:    oklch(0.910 0.005 80);
    --border-2:  oklch(0.870 0.006 80);
    --fg:        oklch(0.180 0.010 80);
    --fg-2:      oklch(0.420 0.008 80);
    --fg-3:      oklch(0.620 0.005 80);
    --fg-4:      oklch(0.780 0.004 80);
    --up:        oklch(0.580 0.110 150);
    --down:      oklch(0.560 0.140 25);
    --shadow:    0 1px 0 rgba(20,18,14,.04), 0 8px 24px -16px rgba(20,18,14,.18);
  }
  .theme-dark {
    --bg:        oklch(0.140 0.005 80);
    --surface:   oklch(0.170 0.005 80);
    --surface-2: oklch(0.205 0.005 80);
    --surface-3: oklch(0.230 0.005 80);
    --border:    oklch(0.245 0.005 80);
    --border-2:  oklch(0.300 0.006 80);
    --fg:        oklch(0.965 0.005 80);
    --fg-2:      oklch(0.745 0.005 80);
    --fg-3:      oklch(0.555 0.005 80);
    --fg-4:      oklch(0.380 0.005 80);
    --up:        oklch(0.720 0.140 150);
    --down:      oklch(0.700 0.150 25);
    --shadow:    0 1px 0 rgba(255,255,255,.03), 0 8px 24px -16px rgba(0,0,0,.6);
  }

  /* density */
  .density-comfortable { --row-h: 56px; --pad-y: 14px; --pad-x: 18px; --gap: 16px; }
  .density-compact     { --row-h: 40px; --pad-y: 8px;  --pad-x: 12px; --gap: 10px; }

  /* font families (set as CSS vars on the artboard root) */
  .font-editorial { --f-display: 'Newsreader', Georgia, serif; --f-ui: 'Geist', ui-sans-serif, system-ui, sans-serif; --f-mono: 'Geist Mono', ui-monospace, monospace; }
  .font-modern    { --f-display: 'Geist', ui-sans-serif, system-ui, sans-serif; --f-ui: 'Geist', ui-sans-serif, system-ui, sans-serif; --f-mono: 'Geist Mono', ui-monospace, monospace; }
  .font-classical { --f-display: 'Instrument Serif', Georgia, serif; --f-ui: 'Inter Tight', ui-sans-serif, system-ui, sans-serif; --f-mono: 'JetBrains Mono', ui-monospace, monospace; }

  /* artboard root surface */
  .pel {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--f-ui);
    width: 100%;
    height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .pel .mono { font-family: var(--f-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
  .pel .serif { font-family: var(--f-display); }
  .pel .num { font-family: var(--f-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .pel .up { color: var(--up); }
  .pel .down { color: var(--down); }
  .pel .muted { color: var(--fg-2); }
  .pel .muted-2 { color: var(--fg-3); }
  .pel .border-b { border-bottom: 1px solid var(--border); }
  .pel .border-t { border-top: 1px solid var(--border); }
  .pel .hairline { border: 1px solid var(--border); }

  /* tag — small rounded label */
  .pel .tag {
    display: inline-flex; align-items: center; gap: 4px;
    height: 22px; padding: 0 8px;
    border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px; color: var(--fg-2);
    font-family: var(--f-ui); font-weight: 500;
    letter-spacing: 0.01em;
  }
  .pel .tag.solid { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  .pel .tag.warn  { color: var(--down); border-color: color-mix(in oklch, var(--down) 35%, var(--border)); }
  .pel .tag.ok    { color: var(--up); border-color: color-mix(in oklch, var(--up) 35%, var(--border)); }

  /* button */
  .pel .btn {
    appearance: none; border: 1px solid var(--border); background: var(--surface);
    color: var(--fg); font-family: var(--f-ui); font-weight: 500; font-size: 13px;
    height: 36px; padding: 0 14px; border-radius: 8px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    letter-spacing: -0.005em;
  }
  .pel .btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .pel .btn.ghost { background: transparent; }
  .pel .btn.sm { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 6px; }
  .pel .btn.lg { height: 44px; padding: 0 18px; font-size: 14px; border-radius: 10px; }

  /* card */
  .pel .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  /* dotted divider — editorial detail */
  .pel .dotted-x {
    height: 1px;
    background-image: radial-gradient(circle, var(--fg-4) 1px, transparent 1.2px);
    background-size: 6px 1px;
    background-repeat: repeat-x;
    background-position: left center;
  }

  /* nav link */
  .pel .nav-link {
    color: var(--fg-2); font-size: 13px; font-weight: 500; text-decoration: none;
    padding: 6px 0; position: relative;
  }
  .pel .nav-link.active { color: var(--fg); }
  .pel .nav-link.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -10px;
    height: 1.5px; background: var(--fg);
  }

  /* sparkline keeps stroke crisp */
  .spark { display: block; }

  /* table */
  .pel .row { display: grid; align-items: center; min-height: var(--row-h); padding: 0 var(--pad-x); }
  .pel .th  { color: var(--fg-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }

  /* avatar — geometric placeholder, no faces */
  .pel .av {
    border-radius: 999px; display: inline-flex; align-items: center; justify-content: center;
    color: var(--bg); font-weight: 600; letter-spacing: 0.02em; flex-shrink: 0;
    font-family: var(--f-ui);
  }

  /* image placeholder */
  .pel .ph {
    background-color: var(--surface-2);
    background-image: repeating-linear-gradient(135deg,
      transparent 0 6px,
      color-mix(in oklch, var(--fg) 5%, transparent) 6px 7px);
    color: var(--fg-3);
    font-family: var(--f-mono); font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  /* slider track for mobile copy ratio */
  .pel input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 999px;
    background: var(--surface-3);
  }
  .pel input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 999px;
    background: var(--fg); border: 3px solid var(--surface);
    box-shadow: 0 0 0 1px var(--border);
  }

  /* selection cursor */
  .pel .seg {
    display: inline-flex; padding: 3px; gap: 2px;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
  }
  .pel .seg button {
    appearance: none; border: 0; background: transparent;
    color: var(--fg-2); font-size: 12px; font-family: var(--f-ui); font-weight: 500;
    padding: 5px 10px; border-radius: 6px; cursor: pointer;
  }
  .pel .seg button.on { background: var(--surface); color: var(--fg); box-shadow: var(--shadow); }

  /* mobile bezel — minimal */
  .bezel {
    border-radius: 36px;
    padding: 8px;
    background: oklch(0.18 0.004 80);
    box-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 24px 60px -30px rgba(0,0,0,.4);
  }
  .bezel-inner { border-radius: 28px; overflow: hidden; height: 100%; position: relative; }
</style>
