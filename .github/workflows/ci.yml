name: CI

on:
  push:
    branches:
      - main
      - 'preview/**'
  pull_request:

jobs:
  vue:
    name: vue/ build & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vue
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: vue/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: vue-dist
          path: vue/dist/
          retention-days: 7

  proxy-syntax:
    name: proxy syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --omit=dev
      # `node -c` parses without executing — safe for files with side effects
      # like server.js (which would otherwise call .listen() and hang CI).
      - run: node -c server.js
      - run: node -c refresher.js
      - run: node -c oidc-client.js
      - run: node -c r2-uploader.js
      # oidc-client is side-effect free; verify it actually loads.
      - run: node -e "const m = require('./oidc-client'); if (!m.loginAndGetToken) process.exit(1)"
      - run: node -e "const m = require('./r2-uploader'); if (typeof m.uploadCatalog !== 'function') process.exit(1)"
      - name: Verify start.sh is POSIX-sh compatible
        run: sh -n start.sh

  worker:
    name: worker/ type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  docker:
    name: docker image build
    # Pre-merge gate: validate the Dockerfile builds before merging into main.
    # On push to main, mctl rebuilds the same image centrally — duplicating
    # that here would just burn ~30 s of CI for no gain. Skip on push.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: pelican:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-vue:
    name: publish @mashkovd/pelican-vue to npm
    needs: [vue]
    # Only publish on push to main AND only when NPM_TOKEN is configured.
    # Skips silently on forks / contributors who haven't set the secret.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vue
    steps:
      - uses: actions/checkout@v4

      - name: Skip if NPM_TOKEN unset
        id: gate
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::warning::NPM_TOKEN secret not set — skipping npm publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: vue/package-lock.json

      - name: Check if version already published
        id: check
        if: steps.gate.outputs.skip != 'true'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@mashkovd/pelican-vue@$PKG_VERSION" version 2>/dev/null | grep -q "$PKG_VERSION"; then
            echo "::notice::@mashkovd/pelican-vue@$PKG_VERSION already on npm — skipping"
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install & build
        if: steps.gate.outputs.skip != 'true' && steps.check.outputs.already != 'true'
        run: npm ci && npm run build

      - name: Publish
        if: steps.gate.outputs.skip != 'true' && steps.check.outputs.already != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: steps.gate.outputs.skip != 'true' && steps.check.outputs.already != 'true'
        run: |
          echo "📦 Published @mashkovd/pelican-vue@${{ steps.check.outputs.version }} to npm" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: deploy to mctl labs/pelican-proxy
    # Only depends on the jobs that actually run on push to main. The docker
    # job is PR-only, so listing it here would skip deploy too.
    needs: [vue, proxy-syntax]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Skip if MCTL_GITHUB_TOKEN unset
        id: gate
        run: |
          if [ -z "${{ secrets.MCTL_GITHUB_TOKEN }}" ]; then
            echo "::warning::MCTL_GITHUB_TOKEN secret not set — skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Compute next SemVer patch
        id: tag
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Use global max tag (all refs) so HEAD ancestry doesn't matter when
          # tags exist on non-ancestor commits (e.g. from other branches).
          LAST=$(git tag -l '[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-' | sort -V | tail -1)
          [ -z "$LAST" ] && LAST="0.0.0"
          MAJOR=$(echo "$LAST" | cut -d. -f1)
          MINOR=$(echo "$LAST" | cut -d. -f2)
          NEW_TAG="${MAJOR}.$((MINOR + 1)).0"
          echo "Last tag: $LAST → New tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Push new tag
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" \
            -m "Auto-deploy ${{ steps.tag.outputs.tag }} from ${{ github.sha }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Trigger mctl deploy-service
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          response=$(curl -fsS -X POST https://api.mctl.ai/api/v1/operations/deploy-service/execute \
            -H "Authorization: Bearer ${{ secrets.MCTL_GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "action": "deploy",
              "team_name": "labs",
              "component_name": "pelican-proxy",
              "dockerfile_repo": "mashkoffdmitry/pelican-libertex-social",
              "git_tag": "${{ steps.tag.outputs.tag }}"
            }')
          echo "mctl response: $response"
          wf=$(echo "$response" | jq -r '.workflow.workflowName // .workflowName // empty')
          if [ -n "$wf" ]; then
            {
              echo "📦 Deploying tag \`${{ steps.tag.outputs.tag }}\` via mctl workflow \`$wf\`"
              echo ""
              echo "🔗 Live: https://labs-pelican-proxy.mctl.ai/__status"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  preview:
    name: preview deployment (preview/* branches)
    needs: [vue, proxy-syntax]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/preview/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MCTL_API: https://api.mctl.ai/api/v1
      TEAM: labs
      SERVICE: pelican-proxy
      REPO: mashkoffdmitry/pelican-libertex-social
    steps:
      - name: Gate secrets
        id: gate
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ] || [ -z "${{ secrets.MCTL_GITHUB_TOKEN }}" ]; then
            echo "::warning::NPM_TOKEN or MCTL_GITHUB_TOKEN not configured — skipping preview"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: vue/package-lock.json

      - name: Compute preview versions
        id: ver
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          BASE=$(node -p "require('./vue/package.json').version" | sed 's/-preview\..*//')
          PRE="${BASE}-preview.${{ github.run_number }}"
          GIT_TAG="preview.${{ github.run_number }}"
          STABLE=$(git describe --tags --abbrev=0 --match '[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo "0.0.0")
          echo "pre=$PRE"         >> "$GITHUB_OUTPUT"
          echo "git_tag=$GIT_TAG" >> "$GITHUB_OUTPUT"
          echo "stable=$STABLE"   >> "$GITHUB_OUTPUT"
          echo "Preview: $PRE | Tag: $GIT_TAG | Stable rollback: $STABLE"

      - name: Build & publish pre-release npm package
        if: steps.gate.outputs.skip != 'true'
        working-directory: vue
        run: |
          npm ci
          npm run build
          npm version --no-git-tag-version "${{ steps.ver.outputs.pre }}"
          npm publish --tag preview --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create preview git tag (ephemeral PKG_VERSION patch)
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          sed -i "s|const PKG_VERSION = '[^']*'|const PKG_VERSION = '${{ steps.ver.outputs.pre }}'|" server.js
          git add server.js
          git commit -m "chore: preview ${{ steps.ver.outputs.git_tag }}"
          git tag -a "${{ steps.ver.outputs.git_tag }}" \
            -m "Preview ${{ steps.ver.outputs.git_tag }} from ${{ github.sha }}"
          # Push only the tag — branch stays clean
          git push origin "${{ steps.ver.outputs.git_tag }}"

      - name: Deploy image via mctl deploy-service
        id: deploy
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          response=$(curl -fsS -X POST "$MCTL_API/operations/deploy-service/execute" \
            -H "Authorization: Bearer ${{ secrets.MCTL_GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"action\": \"deploy\",
              \"team_name\": \"$TEAM\",
              \"component_name\": \"$SERVICE\",
              \"dockerfile_repo\": \"$REPO\",
              \"git_tag\": \"${{ steps.ver.outputs.git_tag }}\"
            }")
          echo "response: $response"
          wf=$(echo "$response" | jq -r '.workflow.workflowName // .workflowName // empty')
          echo "workflow=$wf" >> "$GITHUB_OUTPUT"

      - name: Poll deploy workflow (max 8 min)
        id: poll
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          WF="${{ steps.deploy.outputs.workflow }}"
          if [ -z "$WF" ]; then
            echo "::error::deploy-service returned no workflow name"
            exit 1
          fi
          echo "Polling: $WF"
          for i in $(seq 1 24); do
            sleep 20
            status=$(curl -fsS "$MCTL_API/workflows/$WF" \
              -H "Authorization: Bearer ${{ secrets.MCTL_GITHUB_TOKEN }}" \
              | jq -r '.live.status.phase // "Unknown"')
            echo "[$i/24] $WF → $status"
            if [ "$status" = "Succeeded" ]; then
              echo "deploy_ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            elif echo "$status" | grep -qiE 'fail|error'; then
              echo "deploy_ok=false" >> "$GITHUB_OUTPUT"
              echo "::error::Deploy workflow failed: $status"
              exit 1
            fi
          done
          echo "::error::Timed out after 8 min — $WF still running"
          exit 1

      - name: Create preview environment
        id: preview
        if: steps.gate.outputs.skip != 'true' && steps.poll.outputs.deploy_ok == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          response=$(curl -fsS -X POST "$MCTL_API/operations/preview-deploy/execute" \
            -H "Authorization: Bearer ${{ secrets.MCTL_GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"team_name\": \"$TEAM\",
              \"component_name\": \"$SERVICE\",
              \"image_tag\": \"${{ steps.ver.outputs.git_tag }}\",
              \"ttl_hours\": \"72\"
            }")
          echo "response: $response"
          url=$(echo "$response" | jq -r '.url // .preview_url // .previewUrl // empty')
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Rollback production to stable
        if: steps.gate.outputs.skip != 'true' && steps.poll.outputs.deploy_ok == 'true'
        run: |
          set -euo pipefail
          echo "Rolling back production → ${{ steps.ver.outputs.stable }}"
          curl -fsS -X POST "$MCTL_API/operations/rollback-service/execute" \
            -H "Authorization: Bearer ${{ secrets.MCTL_GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"team_name\": \"$TEAM\",
              \"component_name\": \"$SERVICE\",
              \"image_tag\": \"${{ steps.ver.outputs.stable }}\"
            }" || echo "::warning::Rollback request failed — verify production manually"

      - name: Summary
        if: steps.gate.outputs.skip != 'true'
        run: |
          PREVIEW_URL="${{ steps.preview.outputs.url }}"
          {
            echo "## Preview — ${{ steps.ver.outputs.git_tag }}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| npm pre-release | \`@mashkovd/pelican-vue@${{ steps.ver.outputs.pre }}\` |"
            echo "| image tag | \`${{ steps.ver.outputs.git_tag }}\` |"
            if [ -n "$PREVIEW_URL" ]; then
              echo "| preview URL | $PREVIEW_URL |"
            else
              echo "| preview URL | _see preview-deploy step output_ |"
            fi
            echo "| production rolled back to | \`${{ steps.ver.outputs.stable }}\` |"
            echo "| TTL | 72 h |"
          } >> "$GITHUB_STEP_SUMMARY"
