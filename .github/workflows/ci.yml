name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vue:
    name: vue/ build & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vue
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: vue/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: vue-dist
          path: vue/dist/
          retention-days: 7

  proxy-syntax:
    name: proxy syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --omit=dev
      # `node -c` parses without executing — safe for files with side effects
      # like server.js (which would otherwise call .listen() and hang CI).
      - run: node -c server.js
      - run: node -c refresher.js
      - run: node -c oidc-client.js
      # oidc-client is side-effect free; verify it actually loads.
      - run: node -e "const m = require('./oidc-client'); if (!m.loginAndGetToken) process.exit(1)"
      - name: Verify start.sh is POSIX-sh compatible
        run: sh -n start.sh

  docker:
    name: docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: pelican:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
